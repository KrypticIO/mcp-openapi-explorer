name: Build and Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g., v1.0.0
  # Also run on release creation to ensure binaries are attached
  release:
    types: [created]

# Add explicit permissions for the workflow
permissions:
  contents: write # Required for creating releases and uploading assets
  packages: read

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
            name: macOS-intel-x86_64
          - os: darwin
            arch: arm64
            name: macOS-apple-silicon
          - os: linux
            arch: amd64
            name: linux-intel-x86_64
          - os: linux
            arch: arm64
            name: linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Set up Go
        uses: useblacksmith/setup-go@v6
        with:
          go-version: '1.24' # Use the version that matches your project
          cache: true

      - name: Get version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          elif [[ $GITHUB_EVENT_NAME == 'release' ]]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=unknown" >> $GITHUB_ENV
          fi
          echo "Using version: $VERSION"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0 # Disable CGO for better compatibility
        run: |
          BINARY_NAME="mcp-openapi-explorer-${{ env.VERSION }}-${{ matrix.name }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          echo "Building ${BINARY_NAME}..."
          go build -ldflags="-s -w -X github.com/krypticlabs/mcp-openapi-explorer/cmd.Version=${{ env.VERSION }}" -o "${BINARY_NAME}" .
          
          # Create a checksum file
          sha256sum "${BINARY_NAME}" > "${BINARY_NAME}.sha256"
          
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.sha256
          if-no-files-found: error
          retention-days: 5
      
      # Directly attach binary to release
      - name: Upload binary to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ env.BINARY_NAME }}
          asset_name: ${{ env.BINARY_NAME }}
          asset_content_type: application/octet-stream
      
      # Also upload the checksum
      - name: Upload checksum to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ env.BINARY_NAME }}.sha256
          asset_name: ${{ env.BINARY_NAME }}.sha256
          asset_content_type: text/plain

  # This job creates a release when triggered by a tag push
  create-release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2204
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display artifact structure
        run: |
          ls -la ./artifacts
          find ./artifacts -type f | sort
      
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(env.VERSION, 'beta') || contains(env.VERSION, 'alpha') || contains(env.VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            ./artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 